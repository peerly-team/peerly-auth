name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cd-peerly-auth
  cancel-in-progress: false

env:
  IMAGE_NAME: peerly-auth
  REGISTRY: ghcr.io/peerly-team

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-toolchain

      - name: Generate protobufs
        run: buf generate

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release

  build-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker build -t "$IMAGE" .

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os,library

      - name: Push image
        run: docker push "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"

  build-push-migrations:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build migrations image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-migrations:${{ github.sha }}"
          docker build -t "$IMAGE" -f Dockerfile.migrations .

      - name: Scan migrations image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-migrations:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os

      - name: Push migrations image
        run: docker push "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-migrations:${{ github.sha }}"

  # =========================================================================
  # K3S — bump image tag in peerly-manifests; Argo CD picks up and syncs.
  # The chart's PreSync hook runs the migrations image as a Job before
  # rolling out the new service version.
  # =========================================================================
  deploy-k3s-stage:
    needs: [build-push, build-push-migrations]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout peerly-manifests
        uses: actions/checkout@v4
        with:
          repository: peerly-team/peerly-manifests
          ref: main
          fetch-depth: 0
          token: ${{ secrets.MANIFESTS_PAT }}
          path: manifests

      - name: Bump auth-stage image tag
        run: |
          cd manifests
          sed -i "s|^  tag: .*|  tag: ${{ github.sha }}|" values/auth-stage.yaml
          git config user.email "ci-bot@peerly.local"
          git config user.name "peerly-ci-bot"
          if git diff --quiet values/auth-stage.yaml; then
            echo "no change"
            exit 0
          fi
          git add values/auth-stage.yaml
          git commit -m "stage(auth): bump image to ${{ github.sha }}"
          for i in 1 2 3; do
            git pull --rebase && git push && exit 0
            sleep 5
          done
          echo "::error::failed to push after 3 attempts"
          exit 1

  deploy-k3s-prod:
    needs: deploy-k3s-stage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout peerly-manifests
        uses: actions/checkout@v4
        with:
          repository: peerly-team/peerly-manifests
          ref: main
          fetch-depth: 0
          token: ${{ secrets.MANIFESTS_PAT }}
          path: manifests

      - name: Bump auth-prod image tag
        run: |
          cd manifests
          sed -i "s|^  tag: .*|  tag: ${{ github.sha }}|" values/auth-prod.yaml
          git config user.email "ci-bot@peerly.local"
          git config user.name "peerly-ci-bot"
          if git diff --quiet values/auth-prod.yaml; then
            echo "no change"
            exit 0
          fi
          git add values/auth-prod.yaml
          git commit -m "prod(auth): bump image to ${{ github.sha }}"
          for i in 1 2 3; do
            git pull --rebase && git push && exit 0
            sleep 5
          done
          echo "::error::failed to push after 3 attempts"
          exit 1
