name: Rollback migration

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target DB
        required: true
        type: choice
        options:
          - stage
          - prod
      steps:
        description: How many migrations to roll back
        required: false
        default: "1"

jobs:
  rollback:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-toolchain
        with:
          install-goose: "true"

      - name: Download DB CA certificate
        run: curl -fsSL "${{ vars.DB_CA_URL }}" -o /tmp/db-ca.crt

      - name: Roll back migrations
        env:
          PGHOST: ${{ inputs.environment == 'prod' && secrets.PG_HOST || secrets.PG_HOST_STAGE }}
          PGPORT: ${{ vars.PG_PORT }}
          PGDATABASE: ${{ vars.PG_DATABASE }}
          PGUSER: ${{ vars.PG_USER }}
          PGPASSWORD: ${{ inputs.environment == 'prod' && secrets.PG_PASSWORD || secrets.PG_PASSWORD_STAGE }}
          STEPS: ${{ inputs.steps }}
        run: |
          CONN="host=$PGHOST port=$PGPORT dbname=$PGDATABASE user=$PGUSER password=$PGPASSWORD sslmode=verify-full sslrootcert=/tmp/db-ca.crt"
          for i in $(seq 1 "$STEPS"); do
            echo "--- rollback step $i of $STEPS ---"
            goose -dir src/Peerly.Auth.Persistence/Migrations postgres "$CONN" down
          done
